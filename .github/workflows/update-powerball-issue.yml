name: Update Powerball Data (Issue Trigger)

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  gate:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '/update-powerball')
    steps:
      - name: Check author association
        id: gate
        run: |
          echo "ASSOC=${{ github.event.comment.author_association }}" >> $GITHUB_OUTPUT
      - name: Block if not allowed
        if: ${{ !contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), steps.gate.outputs.ASSOC) }}
        run: |
          echo "Not allowed: ${{ steps.gate.outputs.ASSOC }}"
          exit 1

  update:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps (power-c)
        working-directory: power-c
        run: npm ci || npm install

      - name: Update Powerball data
        working-directory: power-c
        run: npm run update:powerball

      - name: Commit & push if changed
        id: commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "chore(data): update powerball freq (issue trigger)"
          git push
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Comment back
        uses: actions/github-script@v7
        with:
          script: |
            const changed = "${{ steps.commit.outputs.changed }}" === "true";
            const body = changed
              ? "✅ 파워볼 데이터 업데이트 완료! (data/* 갱신)"
              : "ℹ️ 변경사항이 없어 커밋 없이 종료했어.";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
