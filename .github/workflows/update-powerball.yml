name: Update Powerball Data (Scheduled)

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"
    - cron: "15 9 * * *"
    - cron: "15 15 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug tree
        run: |
          pwd
          ls -la
          ls -la scripts || true
          ls -la data || true
          ls -la power-c || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run updater (no npm)
        run: node scripts/update_powerball.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "chore(data): update powerball freq"
          git push
